version: 2

project_name: tracker

before:
  hooks:
    - go mod tidy
    - make fmt-check
    - make vet
    - make test-short

builds:
  - id: tracker
    binary: tracker
    main: ./cmd/tracker
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: tracker-conformance
    binary: tracker-conformance
    main: ./cmd/tracker-conformance
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: tracker
    ids:
      - tracker
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_tracker_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

  - id: tracker-conformance
    ids:
      - tracker-conformance
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_tracker-conformance_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

brews:
  - ids:
      - tracker
    # Don't push prereleases (rc/beta/alpha) or snapshots to the Homebrew tap —
    # stable `brew upgrade` users must not receive a release candidate. The
    # final (non-prerelease) tag publishes the formula.
    skip_upload: "auto"
    repository:
      owner: 2389-research
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/2389-research/tracker
    description: "Pipeline orchestration engine for multi-agent LLM workflows"
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "tracker"
    test: |
      system "#{bin}/tracker", "version"

release:
  # Mark a tag carrying a prerelease segment (e.g. v0.46.0-rc1) as a GitHub
  # prerelease so it does not become "Latest". A plain vX.Y.Z tag is a full release.
  prerelease: auto

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
    - title: Fixes
      regexp: '^fix'
    - title: Other
      order: 999
